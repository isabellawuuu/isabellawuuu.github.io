<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/x-icon" href="/assets/images/icons/favicon.png" />
    <link href="/assets/css/bootstrap.css" rel="stylesheet" />
    <link href="/assets/css/aos.css" rel="stylesheet" />
    <link href="/assets/css/style.css" rel="stylesheet" />

    <title id="page_title"></title>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light" data-aos="fade-in">
      <div class="container">
        <a class="navbar-brand" href="/" id="navbar_title"></a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav" id="navbar_links"></ul>
        </div>
      </div>
    </nav>

    <div class="container" data-aos="fade-in" id="content_wrapper">
      <div class="row main_header">
        <div class="col-lg-4 main_header_info">
          <img alt="user_name" id="home_image" />
          <h1 id="home_name"></h1>
          <h2 id="home_job_title"></h2>
          <div id="home_links"></div>
        </div>

        <div class="col-lg-8 main_header_content">
          <h2 id="home_title" class="title"></h2>
          <div id="home_content"></div>
        </div>
      </div>
    </div>

    <!-- jQuery FIRST -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Site data + renderer -->
    <script src="/data/global.js"></script>
    <script src="/lang/en.js"></script>
    <script src="/assets/scripts/scripts.js"></script>
  </body>
</html>
