<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/x-icon" href="/assets/images/icons/favicon.png" />
    <link href="/assets/css/bootstrap.css" rel="stylesheet" />
    <link href="/assets/css/aos.css" rel="stylesheet" />
    <link href="/assets/css/style.css" rel="stylesheet" />

    <title id="page_title"></title>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container">
        <a class="navbar-brand" href="/" id="navbar_title"></a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav" id="navbar_links"></ul>
        </div>
      </div>
    </nav>

    <div class="container ltr_wrapper" id="content_wrapper">
      <h6 id="contact_title" class="title"></h6>
      <ul id="contact_data"></ul>
    </div>

    <!-- 1) jQuery FIRST (required because scripts.js uses $) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- 2) Bootstrap JS bundle (for navbar toggle) -->
    <script src="/assets/scripts/bootstrap.bundle.min.js"></script>

    <!-- 3) AOS (if your template uses it) -->
    <script src="/assets/scripts/aos.js"></script>

    <!-- 4) Your site data + renderer -->
    <script src="/data/global.js"></script>
    <script src="/lang/en.js"></script>
    <script src="/assets/scripts/scripts.js"></script>
  </body>
</html>
